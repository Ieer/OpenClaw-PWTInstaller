version: 1

# Single source of truth for repository-wide OpenClaw runtime defaults.
# Update this file first, then sync generated defaults where needed.
openclaw_version: 2026.3.11
opencode_ai_version: latest
node_major: 22

ports:
  single_node_gateway_port: 26216
  panopticon_container_gateway_port: 26216
  panopticon_container_bridge_port: 18790

compat:
  gateway_auth_mode: token
  control_ui_disable_device_auth: true
  mission_control_legacy_chat_proxy_enabled: false
  mission_control_direct_agent_links_enabled: false
  mission_control_chat_force_loopback_headers: true
  mission_control_chat_inject_script_enabled: true
  mission_control_chat_clear_device_auth_storage: true
  mission_control_chat_inject_gateway_settings: true
  mission_control_chat_dom_avatar_rewrite: true
  mission_control_chat_sanitize_connect_auth: true
  mission_control_chat_strip_stale_device_fields: true
  mission_control_chat_force_token_in_connect: true
  mission_control_chat_rewrite_control_ui_config: true
  mission_control_chat_rewrite_avatar_payloads: true
