<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  width: 720pt;
  height: 40pt;
  background: #181B24;
  display: flex;
  align-items: center;
  padding-left: 20pt;
  box-sizing: border-box;
}
.header h1 {
  color: #B165FB;
  font-size: 18pt;
  margin: 0;
}
.content {
  width: 720pt;
  height: 365pt;
  padding: 12pt 20pt;
  display: flex;
  gap: 12pt;
  box-sizing: border-box;
}
.left-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8pt;
}
.right-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8pt;
}
.tech-box {
  background: #f8f9fa;
  padding: 8pt;
  border-radius: 6pt;
  border-left: 4pt solid #B165FB;
  box-sizing: border-box;
}
.tech-box h2 {
  color: #181B24;
  font-size: 14pt;
  margin: 0 0 6pt 0;
}
.tech-box ul {
  margin: 0;
  padding-left: 14pt;
  color: #40695B;
}
.tech-box li {
  font-size: 10pt;
  margin-bottom: 3pt;
}
.case-box {
  background: #e7f3ff;
  padding: 10pt;
  border-radius: 6pt;
  border-left: 4pt solid #40695B;
  flex: 1;
  box-sizing: border-box;
}
.case-box h2 {
  color: #181B24;
  font-size: 14pt;
  margin: 0 0 6pt 0;
}
.case-box ul {
  margin: 0;
  padding-left: 14pt;
  color: #181B24;
}
.case-box li {
  font-size: 10pt;
  margin-bottom: 4pt;
}
.case-box strong {
  color: #40695B;
}
</style>
</head>
<body>
<div class="header">
  <h1>多模态 Agent - 从文本到多模态</h1>
</div>
<div class="content">
  <div class="left-col">
    <div class="tech-box">
      <h2>视觉理解</h2>
      <ul>
        <li><strong>CLIP (2021)：</strong>图像-文本对齐</li>
        <li><strong>BLIP, LLaVA：</strong>视觉问答</li>
      </ul>
    </div>
    <div class="tech-box">
      <h2>工具使用</h2>
      <ul>
        <li>API 调用</li>
        <li>代码执行</li>
        <li>浏览器操作</li>
      </ul>
    </div>
    <div class="tech-box">
      <h2>多模态生成</h2>
      <ul>
        <li>DALL-E, Midjourney：图像</li>
        <li>Sora：视频</li>
        <li>Suno：音乐</li>
      </ul>
    </div>
  </div>
  <div class="right-col">
    <div class="case-box">
      <h2>案例</h2>
      <ul>
        <li><strong>GPT-4V：</strong>看图回答问题</li>
        <li><strong>Claude 3.5：</strong>长上下文 + 图像</li>
        <li><strong>Gemini：</strong>原生多模态</li>
      </ul>
    </div>
  </div>
</div>
</body>
</html>
