<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #181B24;
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}
.content {
  text-align: center;
  color: #ffffff;
  max-width: 550pt;
  padding: 20pt;
  box-sizing: border-box;
}
h1 {
  font-size: 32pt;
  color: #B165FB;
  margin-bottom: 25pt;
  font-weight: bold;
}
.section-box {
  background: rgba(255,255,255,0.1);
  padding: 15pt;
  border-radius: 6pt;
  margin-bottom: 15pt;
  border: 2pt solid #40695B;
  box-sizing: border-box;
}
.section-box h2 {
  color: #40695B;
  font-size: 18pt;
  margin: 0 0 10pt 0;
}
.section-box ul {
  margin: 0;
  padding-left: 18pt;
  text-align: left;
}
.section-box li {
  font-size: 12pt;
  margin-bottom: 6pt;
  color: #ffffff;
}
.thanks-box {
  background: #B165FB;
  padding: 20pt;
  border-radius: 6pt;
  color: #ffffff;
  box-sizing: border-box;
}
.thanks-box p {
  font-size: 24pt;
  margin: 0;
  font-weight: bold;
}
</style>
</head>
<body>
<div class="content">
  <h1>Q&A</h1>
  <div class="section-box">
    <h2>参考资源</h2>
    <ul>
      <li><strong>论文：</strong>"Attention Is All You Need" (2017)</li>
      <li><strong>论文：</strong>"Language Models are Few-Shot Learners" (GPT-3, 2020)</li>
      <li><strong>书籍：</strong>《人工智能：现代方法》</li>
      <li><strong>网站：</strong>OpenAI Research, Anthropic Research</li>
      <li><strong>工具：</strong>LangChain, AutoGen, OpenAI API</li>
    </ul>
  </div>
  <div class="thanks-box">
    <p>谢谢！</p>
  </div>
</div>
</body>
</html>
