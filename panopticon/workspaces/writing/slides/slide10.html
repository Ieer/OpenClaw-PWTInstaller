<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  width: 720pt;
  height: 40pt;
  background: #181B24;
  display: flex;
  align-items: center;
  padding-left: 20pt;
  box-sizing: border-box;
}
.header h1 {
  color: #B165FB;
  font-size: 22pt;
  margin: 0;
}
.content {
  width: 720pt;
  height: 365pt;
  padding: 12pt 15pt;
  display: flex;
  flex-direction: column;
  gap: 10pt;
  box-sizing: border-box;
}
.table-container {
  background: #f8f9fa;
  padding: 8pt;
  border-radius: 6pt;
  border-left: 5pt solid #B165FB;
  overflow: hidden;
  box-sizing: border-box;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11pt;
  box-sizing: border-box;
}
th {
  background: #B165FB;
  color: #ffffff;
  padding: 6pt 5pt;
  text-align: left;
  font-weight: bold;
}
td {
  padding: 5pt;
  border-bottom: 1pt solid #e0e0e0;
  color: #181B24;
}
tr:nth-child(even) {
  background: #ffffff;
}
tr:nth-child(odd) {
  background: #f5f5f5;
}
.progress-box {
  background: #e7f3ff;
  padding: 10pt;
  border-radius: 6pt;
  border-left: 5pt solid #40695B;
  box-sizing: border-box;
}
.progress-box h2 {
  color: #181B24;
  font-size: 16pt;
  margin: 0 0 8pt 0;
}
.progress-box ul {
  margin: 0;
  padding-left: 16pt;
  color: #40695B;
}
.progress-box li {
  font-size: 11pt;
  margin-bottom: 4pt;
}
.progress-box strong {
  color: #B165FB;
}
</style>
</head>
<body>
<div class="header">
  <h1>GPT 系列 - 从 1 到 4</h1>
</div>
<div class="content">
  <div class="table-container">
    <table>
      <tr>
        <th>模型</th>
        <th>时间</th>
        <th>参数</th>
        <th>特点</th>
      </tr>
      <tr>
        <td>GPT-1</td>
        <td>2018.06</td>
        <td>117M</td>
        <td>初步验证生成</td>
      </tr>
      <tr>
        <td>GPT-2</td>
        <td>2019.02</td>
        <td>1.5B</td>
        <td>Zero-shot 能力</td>
      </tr>
      <tr>
        <td>GPT-3</td>
        <td>2020.05</td>
        <td>175B</td>
        <td>Few-shot 学习</td>
      </tr>
      <tr>
        <td>GPT-4</td>
        <td>2023.03</td>
        <td>~1.7T</td>
        <td>多模态、推理</td>
      </tr>
    </table>
  </div>
  <div class="progress-box">
    <h2>关键进展</h2>
    <ul>
      <li><strong>规模定律：</strong>更大模型 = 更强能力</li>
      <li><strong>涌现能力：</strong>小模型没有，大模型突然出现</li>
      <li><strong>上下文学习：</strong>无需梯度更新即可学习</li>
    </ul>
  </div>
</div>
</body>
</html>
