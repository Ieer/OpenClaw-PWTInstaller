
<!DOCTYPE html>
<html>
<head>
<style>
body {
  width: 720pt; height: 405pt;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
}
.content {
  text-align: center;
  color: white;
}
h1 {
  font-size: 48pt;
  margin: 0 0 20pt 0;
  color: white;
}
p {
  font-size: 18pt;
  color: white;
  margin: 0;
}
.card {
  width: 400pt;
  height: 200pt;
  background: linear-gradient(135deg, #B165FB 0%, #40695B 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12pt;
  padding: 40pt;
}
</style>
</head>
<body>
<div class="card">
  <div class="content">
    <h1>Auto Gradient</h1>
    <p>CSS gradients are automatically rasterized to PNG!</p>
  </div>
</div>
</body>
</html>
