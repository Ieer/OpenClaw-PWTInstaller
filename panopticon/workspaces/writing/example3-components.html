
<!DOCTYPE html>
<html>
<head>
<style>
body {
  width: 720pt; height: 405pt;
  background: #F8F9FA;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30pt;
}
.content {
  text-align: center;
}
h1 {
  font-size: 30pt;
  color: #181B24;
  margin: 0 0 20pt 0;
}
.cards {
  display: flex;
  gap: 15pt;
  width: 100%;
  justify-content: center;
}
.card {
  width: 180pt;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.card img {
  width: 100%;
  height: auto;
  border-radius: 6pt;
  margin-bottom: 8pt;
}
.button {
  margin-top: 15pt;
}
.button img {
  margin: 0;
}
</style>
</head>
<body>
<div class="content">
  <h1>Component Library</h1>
  <div class="cards">
    <div class="card">
      <img src="components/card-info.png" alt="Info card">
    </div>
    <div class="card">
      <img src="components/card-warning.png" alt="Warning card">
    </div>
    <div class="card">
      <img src="components/card-success.png" alt="Success card">
    </div>
  </div>
  <div class="button">
    <img src="components/button-primary.png" alt="Primary button" style="width: 150pt;">
  </div>
</div>
</body>
</html>
