services:
  mc-redis:
    container_name: mc-redis
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - type: bind
        source: ${PANOPTICON_DATA_DIR:-.}/mission-control/redis-data
        target: /data
    restart: unless-stopped
    networks:
      - panopticon

  mc-postgres:
    container_name: mc-postgres
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mission_control
      POSTGRES_PASSWORD: mission_control
      POSTGRES_DB: mission_control
    volumes:
      - type: bind
        source: ${PANOPTICON_DATA_DIR:-.}/mission-control/postgres-data
        target: /var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - panopticon

  mission-control-api:
    container_name: mission-control-api
    build:
      context: ../mission_control_api
      dockerfile: Dockerfile
    image: mission-control-api:local
    env_file:
      - ./env/mission-control.env.example
      - ./env/mission-control.env
      - ./env/mission-control-ui.env
    environment:
      MC_GLOBAL_SKILLS_DIR: /data/global-skills
      MC_AGENT_HOMES_DIR: /data/agent-homes
      MC_KNOWLEDGE_RAW_SOURCES_DIR: /data/knowledge-sources
      MC_AGENT_CONTROLLER_URL: http://mission-control-agent-controller:9091
    volumes:
      - type: bind
        source: ./agents.manifest.yaml
        target: /app/panopticon_agents.manifest.yaml
        read_only: true
      - type: bind
        source: ./global-skills
        target: /data/global-skills
        read_only: true
      - type: bind
        source: ${PANOPTICON_DATA_DIR:-.}/agent-homes
        target: /data/agent-homes
      - type: bind
        source: ${PANOPTICON_KNOWLEDGE_RAW_SOURCES_PATH:-./mission-control/knowledge-sources}
        target: /data/knowledge-sources
    depends_on:
      - mc-redis
      - mc-postgres
      - mission-control-agent-controller
    ports:
      - "18910:9090"
    restart: unless-stopped
    networks:
      - panopticon


  mission-control-agent-controller:
    container_name: mission-control-agent-controller
    build:
      context: ./agent-controller
      dockerfile: Dockerfile
    image: mission-control-agent-controller:local
    env_file:
      - ./env/mission-control.env.example
      - ./env/mission-control.env
    environment:
      MC_AGENT_CONTROLLER_ALLOWED_AGENTS: nox,metrics,email,growth,trades,health,writing,personal
    volumes:
      - /usr/bin/docker:/usr/bin/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - panopticon

